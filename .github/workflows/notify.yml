name: FTools 提醒推送

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [send-reminder]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 定时检查发送
        if: github.event_name != 'repository_dispatch'
        run: node notify.js
        env:
          GC_WEBHOOK: ${{ secrets.GC_WEBHOOK }}

      - name: 网页直接触发发送
        if: github.event_name == 'repository_dispatch'
        run: |
          curl -s -X POST "$GC_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
        env:
          GC_WEBHOOK: ${{ secrets.GC_WEBHOOK }}
          PAYLOAD: ${{ toJson(github.event.client_payload.message) }}

      - name: 提交更新
        if: github.event_name != 'repository_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reminders.json
          git diff --staged --quiet || git commit -m "update reminders"
          git push
