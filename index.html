<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#1a2e1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FTools"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>FTools</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--g:#3dba6f;--g2:#52d68a;--bg:#0d1a0f;--bg2:#142019;--card:#1c2e1f;--red:#ff5a5a;--tx:#e8f5e8;--tx2:#6a9a6a;--bd:#2a4a2a;--sh:0 4px 24px rgba(0,0,0,.7)}
@media(prefers-color-scheme:light){:root{--bg:#f0f7f0;--bg2:#e2f0e2;--card:#fff;--tx:#1a2e1a;--tx2:#5a8a5a;--bd:#c8e0c8;--sh:0 4px 24px rgba(0,100,0,.1)}}
body{background:var(--bg);padding:env(safe-area-inset-top) 0 18px 0;font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh;overflow-x:hidden}
.hdr{background:var(--bg2);padding:env(safe-area-inset-top) 18px 0;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:36px;height:36px;background:linear-gradient(135deg,#2ea85a,#52d68a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff}
.logo h1{font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--g),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-time{font-size:11px;color:var(--tx2)}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:61px;z-index:99}
.tab{flex:1;padding:9px 2px 7px;text-align:center;font-size:10px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
.tab i{font-size:19px;display:block;margin-bottom:1px;font-style:normal}
.pg{display:none;padding:14px 14px 100px;max-width:560px;margin:0 auto}
.pg.on{display:block}
.card{background:var(--card);border-radius:12px;padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.ct{font-size:12px;font-weight:700;color:var(--tx2);letter-spacing:1px;display:flex;align-items:center;gap:6px;margin-bottom:12px}
.ct:before{content:'';width:3px;height:13px;background:linear-gradient(var(--g),var(--g2));border-radius:2px;flex-shrink:0}
.fr{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fr label{font-size:12px;color:var(--tx2);font-weight:500}
input,select,textarea{width:100%;background:var(--bg2);border:1.5px solid var(--bd);border-radius:8px;padding:10px 13px;font-size:14px;color:var(--tx);font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--g)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:70px}
input[type=datetime-local]{color-scheme:dark}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:.15s}
.btn-g{background:linear-gradient(90deg,var(--g),var(--g2));color:#fff}
.btn-g:active{opacity:.85}
.btn-s{background:var(--bg2);color:var(--tx);border:1.5px solid var(--bd);margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--bg2);color:var(--tx2);margin:3px}
.chip.on{border-color:var(--g);color:var(--g);background:rgba(61,186,111,.12)}
.chips{display:flex;flex-wrap:wrap;gap:2px;margin-top:8px}
.rcard{background:var(--card);border-radius:12px;padding:14px;box-shadow:var(--sh);margin-bottom:10px;display:flex;gap:12px}
.rcard.done{opacity:.45}
.rico{font-size:26px;flex-shrink:0}
.rbody{flex:1;min-width:0}
.rtitle{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rnote{font-size:12px;color:var(--tx2);margin-bottom:6px}
.rmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rtag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(61,186,111,.15);color:var(--g);font-weight:600}
.rtime{font-size:11px;color:var(--tx2)}
.rbtns{display:flex;gap:6px;margin-top:8px}
.rbtn{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer}
.rbtn.del{color:var(--red);border-color:var(--red)}
.rbtn.ok{color:var(--g);border-color:var(--g)}
.empty{text-align:center;padding:60px 20px;color:var(--tx2)}
.empty-ico{font-size:48px;margin-bottom:12px}
.nbar{background:rgba(61,186,111,.1);border:1px solid rgba(61,186,111,.3);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--g);margin-bottom:12px}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-ico">F</div>
      <h1>FTools</h1>
    </div>
    <div class="logo-time" id="htime"></div>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab0" onclick="goTab(0)"><i>⏰</i>提醒</div>
    <div class="tab" id="tab1" onclick="goTab(1)"><i>🌾</i>农场</div>
    <div class="tab" id="tab2" onclick="goTab(2)"><i>➕</i>添加</div>
    <div class="tab" id="tab3" onclick="goTab(3)"><i>⚙️</i>设置</div>
  </div>
</div>

<div class="pg on" id="pg0">
  <div class="nbar">☁️ 提醒由 GitHub Actions 后台发送 — 关闭网页也能收到通知</div>
  <div id="rlist"></div>
</div>

<div class="pg" id="pg1">
  <div class="card"><div class="ct">🌾 我的农场</div><p style="text-align:center;padding:30px 0;color:var(--tx2)">农场功能开发中...</p></div>
</div>

<div class="pg" id="pg2">
  <div class="card">
    <div class="ct">分类</div>
    <div class="chips" id="catchips">
      <div class="chip on" data-cat="life" onclick="pickCat(this)">🌿 生活</div>
      <div class="chip" data-cat="work" onclick="pickCat(this)">💼 工作</div>
      <div class="chip" data-cat="health" onclick="pickCat(this)">❤️ 健康</div>
      <div class="chip" data-cat="study" onclick="pickCat(this)">📚 学习</div>
      <div class="chip" data-cat="food" onclick="pickCat(this)">🍽️ 饮食</div>
      <div class="chip" data-cat="sport" onclick="pickCat(this)">🏃 运动</div>
      <div class="chip" data-cat="farm" onclick="pickCat(this)">🌾 农场</div>
      <div class="chip" data-cat="other" onclick="pickCat(this)">📌 其他</div>
    </div>
  </div>
  <div class="card">
    <div class="ct">提醒内容</div>
    <div class="fr"><label>标题 *</label><input id="rt" placeholder="喝水、吃药、开会..."/></div>
    <div class="fr"><label>备注（可选）</label><textarea id="rn" placeholder="详细说明..."></textarea></div>
    <div class="fr"><label>提醒时间 *</label><input type="datetime-local" id="rtime"/></div>
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <div class="fr" style="flex:1"><label>重复</label>
        <select id="rrep"><option value="none">不重复</option><option value="daily">每天</option><option value="weekly">每周</option></select>
      </div>
      <div class="fr" style="flex:1"><label>提前提醒</label>
        <select id="radv"><option value="0">准时</option><option value="5">提前5分钟</option><option value="10">提前10分钟</option><option value="30">提前30分钟</option></select>
      </div>
    </div>
    <button class="btn btn-g" id="saveBtn" onclick="addReminder()">✅ 保存提醒</button>
  </div>
</div>

<div class="pg" id="pg3">
  <div class="card">
    <div class="ct">🔑 GitHub Token</div>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:12px;line-height:1.7">保存提醒时用于同步到 GitHub，Actions 后台定时检查并发送通知。Token 只存在本机，不会上传。</p>
    <div class="fr"><label>Personal Access Token（repo 权限）</label><input id="cfgTok" type="password" placeholder="ghp_..."/></div>
    <button class="btn btn-s" onclick="testTok()">🔗 测试连接</button>
    <div id="tokStatus" style="font-size:12px;margin-top:8px;display:none"></div>
  </div>
  <button class="btn btn-g" onclick="saveCfg()">💾 保存设置</button>
  <div class="card" style="margin-top:12px">
    <div class="ct">⚠️ 数据操作</div>
    <button class="btn btn-s" onclick="exportD()">📤 导出提醒</button>
    <button class="btn btn-s" style="color:var(--red);border-color:var(--red);margin-top:8px" onclick="clearAll()">🗑️ 清空所有</button>
  </div>
</div>

<div id="toast"></div>

<script>
var REPO = 'PrincessXing/life-reminder';
var R = JSON.parse(localStorage.getItem('R')||'[]');
var CFG = JSON.parse(localStorage.getItem('CFG')||'{}');
var selCat = 'life';
var CAT = {life:'🌿',work:'💼',health:'❤️',study:'📚',food:'🍽️',sport:'🏃',farm:'🌾',other:'📌'};

function goTab(i){
  for(var j=0;j<4;j++){
    document.getElementById('pg'+j).className='pg'+(j===i?' on':'');
    document.getElementById('tab'+j).className='tab'+(j===i?' on':'');
  }
  if(i===3) loadCfg();
}

function pickCat(el){
  document.querySelectorAll('#catchips .chip').forEach(function(c){c.className='chip';});
  el.className='chip on';
  selCat = el.dataset.cat;
}

async function addReminder(){
  var title = document.getElementById('rt').value.trim();
  var tv = document.getElementById('rtime').value;
  if(!title){toast('请填写标题');return;}
  if(!tv){toast('请选择时间');return;}
  var at = new Date(tv).getTime();
  var adv = parseInt(document.getElementById('radv').value)||0;
  if(at - adv*60000 < Date.now()){toast('时间已过，请重新设置');return;}

  var r = {
    id: Date.now()+'',
    cat: selCat,
    title: title,
    note: document.getElementById('rn').value.trim(),
    at: at,
    adv: adv,
    rep: document.getElementById('rrep').value,
    done: false,
    _sent: false
  };

  // 禁用按钮防止重复点击
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '同步中...';

  R.push(r);
  saveR();

  // 同步到 GitHub reminders.json
  var ok = await syncToGithub();

  btn.disabled = false;
  btn.textContent = '✅ 保存提醒';

  if(ok){
    toast('✅ 已保存！关闭网页也会准时收到通知');
  } else {
    toast('⚠️ 本地已保存，但未同步到GitHub（检查Token设置）');
  }

  document.getElementById('rt').value='';
  document.getElementById('rn').value='';
  document.getElementById('rtime').value='';
  goTab(0);
  renderList();
}

// 同步 reminders.json 到 GitHub
async function syncToGithub(){
  var tok = CFG.tok;
  if(!tok) return false;
  try {
    // 获取当前文件 sha
    var getR = await fetch('https://api.github.com/repos/'+REPO+'/contents/reminders.json', {
      headers: {'Authorization': 'token '+tok}
    });
    var getD = await getR.json();

    // 构建新内容
    var data = {
      reminders: R.map(function(r){
        return {id:r.id, cat:r.cat, title:r.title, note:r.note||'', at:r.at, adv:r.adv||0, rep:r.rep||'none', done:r.done, _sent:false};
      })
    };
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

    // 上传
    var putR = await fetch('https://api.github.com/repos/'+REPO+'/contents/reminders.json', {
      method: 'PUT',
      headers: {'Authorization': 'token '+tok, 'Content-Type': 'application/json'},
      body: JSON.stringify({message: 'add reminder: '+R[R.length-1].title, content: content, sha: getD.sha})
    });
    return putR.ok;
  } catch(e) {
    return false;
  }
}

function testTok(){
  var tok = document.getElementById('cfgTok').value.trim();
  var el = document.getElementById('tokStatus');
  if(!tok){toast('请填写Token');return;}
  el.style.display='block'; el.textContent='连接中...';
  fetch('https://api.github.com/repos/'+REPO, {headers:{'Authorization':'token '+tok}})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
    .then(function(x){
      el.textContent = x.ok ? '✅ 连接成功！Token 有效' : '❌ '+(x.d.message||'失败');
      el.style.color = x.ok ? 'var(--g)' : 'var(--red)';
    }).catch(function(){ el.textContent='❌ 网络错误'; el.style.color='var(--red)'; });
}

function loadCfg(){ document.getElementById('cfgTok').value = CFG.tok||''; }
function saveCfg(){
  CFG.tok = document.getElementById('cfgTok').value.trim();
  localStorage.setItem('CFG', JSON.stringify(CFG));
  toast('✅ 设置已保存');
}

function renderList(){
  var el = document.getElementById('rlist');
  var all = R.filter(function(r){return!r.done;}).concat(R.filter(function(r){return r.done;}));
  if(!all.length){
    el.innerHTML='<div class="empty"><div class="empty-ico">⏰</div><p>还没有提醒，去"添加"创建吧</p></div>';
    return;
  }
  el.innerHTML = all.map(function(r){
    var ico = CAT[r.cat]||'📌';
    var dt = new Date(r.at);
    var ts = (dt.getMonth()+1)+'/'+dt.getDate()+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);
    var adv = r.adv ? ' · 提前'+r.adv+'分钟' : '';
    var sent = r._sent ? ' <span style="color:var(--g)">✓已发送</span>' : '';
    return '<div class="rcard'+(r.done?' done':'')+'">'+
      '<div class="rico">'+ico+'</div>'+
      '<div class="rbody">'+
      '<div class="rtitle">'+r.title+'</div>'+
      (r.note?'<div class="rnote">'+r.note+'</div>':'')+
      '<div class="rmeta"><span class="rtag">'+ico+' '+r.cat+'</span>'+
      '<span class="rtime">⏰ '+ts+adv+sent+'</span></div>'+
      '<div class="rbtns">'+
      '<button class="rbtn ok" onclick="togDone(\''+r.id+'\')">'+(r.done?'↩️ 恢复':'✅ 完成')+'</button>'+
      '<button class="rbtn del" onclick="delR(\''+r.id+'\')">🗑️ 删除</button>'+
      '</div></div></div>';
  }).join('');
}

function togDone(id){
  var r=R.find(function(x){return x.id===id;});
  if(!r)return;
  r.done=!r.done;
  saveR(); renderList(); syncToGithub();
}
function delR(id){
  R=R.filter(function(r){return r.id!==id;});
  saveR(); renderList(); syncToGithub();
}
function clearAll(){
  if(!confirm('确定清空？'))return;
  R=[]; saveR(); renderList(); syncToGithub();
}
function exportD(){
  var a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify({reminders:R},null,2));
  a.download='reminders.json'; a.click();
}
function saveR(){ localStorage.setItem('R', JSON.stringify(R)); }
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},3000);
}
function tick(){
  var n=new Date();
  document.getElementById('htime').textContent=
    (n.getMonth()+1)+'/'+n.getDate()+' '+('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)+':'+('0'+n.getSeconds()).slice(-2);
}
setInterval(tick,1000); tick();
renderList();
</script>
</body>
</html>
