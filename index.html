<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#1a2e1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FTools"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>FTools</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--g:#3dba6f;--g2:#52d68a;--g3:#1a6e3a;--bg:#0d1a0f;--bg2:#142019;--bg3:#1c2e1f;--card:#1c2e1f;--red:#ff5a5a;--yel:#ffd460;--ora:#ff9f4a;--tx:#e8f5e8;--tx2:#6a9a6a;--bd:#2a4a2a;--sh:0 4px 24px rgba(0,0,0,.5);--r:18px;--rs:12px}
@media(prefers-color-scheme:light){:root{--bg:#f0f7f0;--bg2:#e2f0e2;--bg3:#fff;--card:#fff;--tx:#1a2e1a;--tx2:#5a8a5a;--bd:#c8e0c8;--sh:0 4px 24px rgba(0,100,0,.1)}}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'SF Pro Display','PingFang SC',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.hdr{background:var(--bg2);padding:env(safe-area-inset-top,0) 18px 0;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:36px;height:36px;background:linear-gradient(135deg,#2ea85a,#52d68a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff}
.logo h1{font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--g),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hdr-time{font-size:11px;color:var(--tx2)}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:61px;z-index:99}
.tab{flex:1;padding:9px 2px 7px;text-align:center;font-size:10px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
.tab i{font-size:19px;display:block;margin-bottom:1px;font-style:normal}
.pg{display:none;padding:14px 14px 100px;max-width:560px;margin:0 auto}.pg.on{display:block}
.card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px;border:1px solid var(--bd)}
.ct{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:12px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.ct::before{content:'';width:3px;height:13px;background:linear-gradient(var(--g),var(--g2));border-radius:2px;flex-shrink:0}
.fr{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fr label{font-size:12px;color:var(--tx2);font-weight:500}
input,select,textarea{width:100%;background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rs);padding:10px 13px;font-size:14px;color:var(--tx);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--g)}
select option{background:var(--bg2);color:var(--tx)}
textarea{resize:vertical;min-height:65px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{border:none;border-radius:var(--rs);padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn:active{opacity:.8;transform:scale(.97)}
.btnp{background:linear-gradient(135deg,var(--g3),var(--g));color:#fff;width:100%;font-weight:800;box-shadow:0 4px 14px rgba(61,186,111,.3)}
.btnd{background:rgba(255,90,90,.1);color:var(--red);padding:7px 14px;font-size:12px;border-radius:10px;border:1px solid rgba(255,90,90,.25)}
.btns{padding:6px 12px;font-size:12px;border-radius:8px}
.sbar{border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;border:1px solid;line-height:1.5}
.sbar.ok{background:rgba(61,186,111,.08);border-color:rgba(61,186,111,.3);color:var(--g)}
.sbar.warn{background:rgba(255,212,96,.08);border-color:rgba(255,212,96,.3);color:var(--yel)}
.sbar.err{background:rgba(255,90,90,.08);border-color:rgba(255,90,90,.3);color:var(--red)}
.cc-wrap{overflow-x:auto;margin:0 -16px;padding:0 16px 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cc-wrap::-webkit-scrollbar{display:none}
.cc-row{display:flex;gap:9px;width:max-content;padding-right:16px}
.cc{scroll-snap-align:start;background:var(--bg2);border:1.5px solid var(--bd);border-radius:16px;padding:12px 10px;width:108px;flex-shrink:0;cursor:pointer;text-align:center;position:relative;transition:border .15s}
.cc.sel{border-color:var(--g);background:rgba(61,186,111,.1)}
.cc .ci{font-size:30px;display:block;margin-bottom:5px}
.cc .cn{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:2px}
.cc .cd{font-size:11px;color:var(--tx2)}
.cc .cp{font-size:11px;color:var(--yel);margin-top:2px}
.cc .ce{position:absolute;top:5px;right:5px;font-size:11px;opacity:.4;background:none;border:none;cursor:pointer;padding:2px}
.cc-add{scroll-snap-align:start;background:transparent;border:1.5px dashed var(--bd);border-radius:16px;padding:12px 10px;width:108px;flex-shrink:0;cursor:pointer;text-align:center;color:var(--tx2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:12px}
.cctabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;scrollbar-width:none;padding-bottom:2px}
.cctabs::-webkit-scrollbar{display:none}
.cctab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;background:var(--bg2)}
.cctab.on{border-color:var(--g);color:var(--g);background:rgba(61,186,111,.1)}
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.mover.on{display:flex}
.modal{background:var(--bg3);border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:480px;border-top:1px solid var(--bd);animation:su .28s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhd{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.mcl{font-size:18px;cursor:pointer;color:var(--tx2);background:var(--bg2);border:none;width:30px;height:30px;border-radius:50%}
.psel{display:flex;gap:8px;margin-bottom:10px}
.popt{flex:1;padding:9px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--bg2);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.2s}
.popt.on{border-color:var(--g);color:var(--g);background:rgba(61,186,111,.1)}
.fchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.fchip{padding:5px 12px;border-radius:20px;font-size:12px;border:1.5px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer}
.fchip.on{border-color:var(--g);color:var(--g)}
.tscs{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tsc{padding:5px 10px;border-radius:8px;font-size:12px;background:var(--bg2);border:1px solid var(--bd);color:var(--tx2);cursor:pointer}
.item{background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--bd);margin-bottom:9px;position:relative;overflow:hidden}
.item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--g)}
.item.mat{border-color:rgba(255,212,96,.4);background:linear-gradient(135deg,rgba(255,212,96,.07),rgba(255,159,74,.04))}
.item.mat::before{background:var(--yel)}
.item.soon::before{background:var(--ora)}
.irow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ibody{flex:1;min-width:0}
.itr{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.iemj{font-size:20px;flex-shrink:0}
.itit{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{font-size:11px;color:var(--tx2);margin-bottom:4px}
.icd{font-size:13px;font-weight:700;color:var(--g)}
.icd.done{color:var(--red);animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.prog{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:7px}
.progb{height:100%;border-radius:2px;transition:width 1s linear}
.delbtn{background:rgba(255,90,90,.1);border:none;color:var(--red);font-size:15px;width:30px;height:30px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cats{display:flex;flex-wrap:wrap;gap:6px}
.cchip{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);color:var(--tx2);background:var(--bg2)}
.cchip.on{border-color:currentColor}
.sl{font-size:10px;color:var(--tx2);font-weight:700;letter-spacing:1.5px;margin:14px 0 7px 3px;text-transform:uppercase}
.empty{text-align:center;padding:44px 20px;color:var(--tx2)}
.eico{font-size:44px;margin-bottom:10px;opacity:.4}
.srow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd)}
.srow:last-child{border:none}
.slb{font-size:14px;color:var(--tx);font-weight:500}
.ssb{font-size:11px;color:var(--tx2);margin-top:1px}
.tog{width:46px;height:25px;background:var(--bg2);border-radius:13px;position:relative;cursor:pointer;border:1px solid var(--bd);transition:.3s}
.tog.on{background:var(--g);border-color:var(--g)}
.tog::after{content:'';width:19px;height:19px;background:#fff;border-radius:50%;position:absolute;top:2px;left:3px;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on::after{left:24px}
.slist{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.si{padding:7px 13px;border-radius:10px;font-size:12px;background:var(--bg2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:5px}
.si.on{border-color:var(--g);color:var(--g);background:rgba(61,186,111,.1)}
.exparea{background:var(--bg2);border-radius:10px;padding:10px;font-size:11px;color:var(--tx2);word-break:break-all;max-height:80px;overflow-y:auto;border:1px solid var(--bd);margin-top:8px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);color:var(--tx);padding:10px 20px;border-radius:14px;font-size:13px;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap;border:1px solid var(--bd);box-shadow:var(--sh)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:360px){.r2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <div class="logo"><div class="logo-ico">F</div><h1>FTools</h1></div>
    <div class="hdr-time" id="htime"></div>
  </div>
</div>
<div class="tabs">
  <div class="tab on" id="tab-r" onclick="goTab('r')"><i>⏰</i>提醒</div>
  <div class="tab" id="tab-f" onclick="goTab('f')"><i>🌾</i>农场</div>
  <div class="tab" id="tab-a" onclick="goTab('a')"><i>＋</i>添加</div>
  <div class="tab" id="tab-s" onclick="goTab('s')"><i>⚙️</i>设置</div>
</div>

<!-- 提醒页 -->
<div class="pg on" id="pg-r">
  <div id="workerbar" style="display:none"></div>
  <div id="rlist"></div>
</div>

<!-- 农场页 -->
<div class="pg" id="pg-f">
  <div class="card">
    <div class="ct">偷谁的菜</div>
    <div class="psel">
      <div class="popt on" data-v="自己" onclick="pickP(this)">🙋 自己</div>
      <div class="popt" data-v="好友" onclick="pickP(this)">👥 好友</div>
    </div>
    <div id="farea" style="display:none">
      <div class="fchips" id="fchips"></div>
      <div style="display:flex;gap:7px;margin-top:8px">
        <input id="nfriend" placeholder="输入好友昵称" style="flex:1"/>
        <button class="btn btns" style="background:var(--g);color:#fff;width:auto" onclick="addFriend()">添加</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="ct">选择作物 <span style="font-size:10px;font-weight:400;text-transform:none;color:var(--tx2)">← 滑动 · ✏️编辑</span></div>
    <div class="cctabs" id="cctabs"></div>
    <div class="cc-wrap"><div class="cc-row" id="ccrow"></div></div>
  </div>
  <div class="card">
    <div class="ct">自定义作物</div>
    <div class="r2">
      <div class="fr"><label>名称</label><input id="ccn" placeholder="如：荔枝"/></div>
      <div class="fr"><label>成熟时间</label><input id="cct" placeholder="1h30m 或 90"/></div>
    </div>
    <div class="fr"><label>单价（可选）</label><input id="ccp" placeholder="如：500金币"/></div>
    <div class="tscs">
      <span style="font-size:11px;color:var(--tx2);align-self:center">快捷：</span>
      <div class="tsc" onclick="setCCT('30m')">30分</div>
      <div class="tsc" onclick="setCCT('1h')">1h</div>
      <div class="tsc" onclick="setCCT('2h')">2h</div>
      <div class="tsc" onclick="setCCT('4h')">4h</div>
      <div class="tsc" onclick="setCCT('6h')">6h</div>
      <div class="tsc" onclick="setCCT('8h')">8h</div>
      <div class="tsc" onclick="setCCT('12h')">12h</div>
      <div class="tsc" onclick="setCCT('24h')">1天</div>
    </div>
  </div>
  <div class="card">
    <div class="ct">种植时间</div>
    <div class="fr"><label>留空 = 现在种植</label><input id="fpat" type="datetime-local"/></div>
    <button class="btn btnp" onclick="addFarm()">🌱 添加偷菜提醒</button>
  </div>
  <div id="flist"></div>
</div>

<!-- 添加页 -->
<div class="pg" id="pg-a">
  <div class="card">
    <div class="ct">分类</div>
    <div class="cats" id="catchips"></div>
  </div>
  <div class="card">
    <div class="ct">提醒内容</div>
    <div class="fr"><label>标题</label><input id="rt" placeholder="喝水、吃药、开会..."/></div>
    <div class="fr"><label>备注（可选）</label><textarea id="rn" placeholder="详细说明..."></textarea></div>
    <div class="fr"><label>提醒时间</label><input id="rtime" type="datetime-local"/></div>
    <div class="r2">
      <div class="fr"><label>重复</label>
        <select id="rrep">
          <option value="none">不重复</option>
          <option value="daily">每天</option>
          <option value="weekdays">工作日</option>
          <option value="weekly">每周</option>
          <option value="hourly">每小时</option>
          <option value="30min">每30分钟</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="fr"><label>提前提醒</label>
        <select id="radv">
          <option value="0">准时</option>
          <option value="5">5分钟前</option>
          <option value="10">10分钟前</option>
          <option value="15">15分钟前</option>
          <option value="30">30分钟前</option>
          <option value="60">1小时前</option>
        </select>
      </div>
    </div>
    <div class="fr" id="rintrow" style="display:none"><label>间隔（分钟）</label><input id="rint" type="number" min="1" value="60"/></div>
    <button class="btn btnp" onclick="addReminder()">✅ 保存提醒</button>
  </div>
</div>

<!-- 设置页 -->
<div class="pg" id="pg-s">
  <div class="card" style="border-color:rgba(61,186,111,.4)">
    <div class="ct" style="color:var(--g)">🚀 后台推送配置</div>
    <p style="font-size:12px;color:var(--tx2);line-height:1.8;margin-bottom:14px">
      填入 Worker 地址和 Bark Key 后，<b style="color:var(--tx)">锁屏、关页面也能准时收到通知</b>。
    </p>
    <div class="fr"><label>Worker 地址</label><input id="workerUrl" placeholder="https://frosty-lab-441a.lychee-l.workers.dev"/></div>
    <div class="fr"><label>Bark Key</label><input id="barkKey" placeholder="从 Bark App 复制"/></div>
    <div class="fr"><label>Bark 服务器（默认不用改）</label><input id="barkSrv" placeholder="https://api.day.app"/></div>
    <div style="display:flex;gap:8px">
      <button class="btn btnp" style="flex:1" onclick="saveCfg()">💾 保存</button>
      <button class="btn" style="flex:1;background:var(--bg2);border:1px solid var(--bd);color:var(--tx)" onclick="testWorker()">🧪 测试</button>
    </div>
    <div id="cfgbar" style="display:none;margin-top:10px"></div>
  </div>
  <div class="card">
    <div class="ct">页面通知（备用）</div>
    <div class="srow">
      <div><div class="slb">浏览器通知</div><div class="ssb" id="ntxt">检测中...</div></div>
      <button class="btn btnp" style="width:auto;padding:8px 14px;font-size:12px" onclick="reqNotif()">开启</button>
    </div>
    <div class="srow">
      <div><div class="slb">页面声音</div><div class="ssb">页面开着时播放铃声</div></div>
      <div class="tog on" id="tog-sound" onclick="togSet('sound')"></div>
    </div>
    <div class="srow">
      <div><div class="slb">标题闪烁</div><div class="ssb">到期时标题闪烁10秒</div></div>
      <div class="tog on" id="tog-title" onclick="togSet('titleAlert')"></div>
    </div>
  </div>
  <div class="card">
    <div class="ct">铃声 <span style="font-size:10px;font-weight:400;text-transform:none">点 ▶ 试听</span></div>
    <div class="slist" id="sndlist"></div>
    <div class="fr" style="margin-top:10px"><label>上传自定义铃声（MP3/WAV，≤5MB）</label><input type="file" id="sndfile" accept="audio/*" onchange="uploadSnd()" style="font-size:14px;padding:8px"/></div>
    <div class="fr"><label>重复播放次数</label>
      <select id="sndcnt" onchange="S.cfg.sndCnt=+this.value;save()">
        <option value="1">1次</option><option value="2">2次</option><option value="3">3次</option>
      </select>
    </div>
  </div>
  <div class="card">
    <div class="ct">自定义分类</div>
    <div id="catmng"></div>
    <div style="display:flex;gap:7px;margin-top:10px">
      <input id="nico" placeholder="图标" style="width:56px"/>
      <input id="nlbl" placeholder="分类名称" style="flex:1"/>
      <button class="btn btns btnp" style="width:auto" onclick="addCat()">添加</button>
    </div>
  </div>
  <div class="card">
    <div class="ct">数据备份</div>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:10px">更新代码前先导出，导入可恢复所有提醒</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btnp" style="flex:1;min-width:100px" onclick="exportD()">📤 导出</button>
      <button class="btn" style="flex:1;min-width:100px;background:var(--bg2);border:1px solid var(--bd);color:var(--tx)" onclick="document.getElementById('impfile').click()">📥 导入</button>
    </div>
    <input type="file" id="impfile" accept=".json" style="display:none" onchange="importD()"/>
    <div id="expview" class="exparea" style="display:none"></div>
  </div>
  <div class="card">
    <div class="ct">数据管理</div>
    <div class="srow"><div><div class="slb">清除已到期提醒</div></div><button class="btn btnd" onclick="clearDone()">清除</button></div>
    <div class="srow"><div><div class="slb">清除全部数据</div></div><button class="btn btnd" onclick="clearAll()">全部清除</button></div>
  </div>
  <div style="text-align:center;font-size:11px;color:var(--tx2);padding:8px;opacity:.4">FTools v13</div>
</div>

<!-- 编辑作物弹窗 -->
<div class="mover" id="cmodal" onclick="if(event.target===this)closeCM()">
  <div class="modal">
    <div class="mhd">编辑作物<button class="mcl" onclick="closeCM()">✕</button></div>
    <input type="hidden" id="eidx"/>
    <div class="r2">
      <div class="fr"><label>图标</label><input id="eico"/></div>

const DCAT=[

];

  {id:'bell',l:'清脆铃声'},{id:'chime',l:'钟声'},{id:'marimba',l:'木琴'},

];
const RLBL={none:'不重复',daily:'每天',weekdays:'工作日',weekly:'每周',hourly:'每小时','30min':'每30分',custom:'自定义'};

let S={rem:[],cats:JSON.parse(JSON.stringify(DCAT)),ucrop:[],friends:[],
  cfg:{sound:true,titleAlert:true,snd:'bell',sndData:null,sndCnt:2,workerUrl:'',barkKey:'',barkSrv:'https://api.day.app',userId:''}};

let ntf=new Set(),actx=null;
const KEY='ft_v3';

function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}; syncWorker();}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY)||'{}');
    if(d.rem)S.rem=d.rem; if(d.cats)S.cats=d.cats; if(d.ucrop)S.ucrop=d.ucrop;
    if(d.friends)S.friends=d.friends; if(d.cfg)S.cfg={...S.cfg,...d.cfg};
    if(!S.cfg.userId)S.cfg.userId='u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  }catch(e){}
}

// ★ 核心：用 Image GET 请求同步到 Worker，完全绕过 iOS CORS
function syncWorker(){
  const url=(S.cfg.workerUrl||'').trim().replace(/\/$/,'');
  if(!url||!S.cfg.barkKey||!S.cfg.userId)return;
  try{
    const remData=S.rem.map(r=>({id:r.id,cat:r.cat,title:r.title,note:r.note||'',at:r.at,pa:r.pa,rep:r.rep,intv:r.intv||60,adv:r.adv||0,done:r.done||false}));
    const d=encodeURIComponent(JSON.stringify(remData));
    const k=encodeURIComponent(S.cfg.barkKey);
    const sv=encodeURIComponent(S.cfg.barkSrv||'https://api.day.app');
    const u=encodeURIComponent(S.cfg.userId);
    const img=new Image();
    img.src=url+'/sync?u='+u+'&k='+k+'&s='+sv+'&d='+d+'&_='+Date.now();
  }catch(e){}
}

function testWorker(){
  const url=(document.getElementById('workerUrl').value||'').trim().replace(/\/$/,'');
  const key=(document.getElementById('barkKey').value||'').trim();
  if(!url){showCfgBar('请先填写 Worker 地址','warn');return}
  if(!key){showCfgBar('请先填写 Bark Key','warn');return}
  showCfgBar('测试中...','warn');
  let done=false;
  const timer=setTimeout(()=>{if(!done){done=true;showCfgBar('⚠️ 请直接保存配置，添加1分钟后的提醒测试 Bark 是否推送','warn');}},5000);
  const img=new Image();
  img.onload=img.onerror=()=>{if(!done){clearTimeout(timer);done=true;showCfgBar('✅ Worker 可达，请保存配置','ok');}};
  img.src=url+'/ping?_='+Date.now();
}
function showCfgBar(msg,type){const el=document.getElementById('cfgbar');el.style.display='block';el.innerHTML='<div class="sbar '+type+'">'+msg+'</div>';}
function saveCfg(){
  S.cfg.workerUrl=document.getElementById('workerUrl').value.trim();
  S.cfg.barkKey=document.getElementById('barkKey').value.trim();
  S.cfg.barkSrv=document.getElementById('barkSrv').value.trim()||'https://api.day.app';
  try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}
  syncWorker(); renderWorkerBar(); toast('✅ 配置已保存');
}
function renderWorkerBar(){
  const el=document.getElementById('workerbar'); if(!el)return;
  el.style.display='block';
  if(S.cfg.workerUrl&&S.cfg.barkKey){
    el.innerHTML='<div class="sbar ok">🚀 后台推送已启用 — 关闭页面锁屏都能收到 Bark 通知</div>';
  }else{
    el.innerHTML='<div class="sbar warn">⚠️ 未配置后台推送 — 去「设置」填写 Worker 地址和 Bark Key</div>';
  }
}

load();
renderAll();renderSndList();
document.getElementById('sndcnt').value=String(S.cfg.sndCnt||2);
document.getElementById('tog-sound').className='tog'+(S.cfg.sound?' on':'');
document.getElementById('tog-title').className='tog'+(S.cfg.titleAlert?' on':'');
document.getElementById('workerUrl').value=S.cfg.workerUrl||'';
document.getElementById('barkKey').value=S.cfg.barkKey||'';

checkNotif(); renderWorkerBar();
setInterval(tick,1000);

function renderAll(){renderCatChips();renderCCTabs();renderCCRow();renderFChips();renderRList();renderFList();renderCatMng();}

function tick(){
  const n=new Date(),el=document.getElementById('htime');
  if(el)el.textContent=n.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  checkTrig();renderRList();renderFList();
}
function checkNotif(){
  const p=typeof Notification!=='undefined'?Notification.permission:'denied';
  const nt=document.getElementById('ntxt');
  if(nt)nt.textContent=p==='granted'?'✅ 已开启':p==='denied'?'❌ 已拒绝':'⚠️ 未开启';
}
async function reqNotif(){
  if(typeof Notification==='undefined'){toast('不支持通知');return}
  const p=await Notification.requestPermission();checkNotif();
  toast(p==='granted'?'🔔 已开启':'请在浏览器设置中允许');
}
function notify(title,body){
  if(S.cfg.sound)playSound();
  if(Notification.permission==='granted'){try{new Notification(title,{body,icon:'./icon.png'})}catch(e){}}
  if(S.cfg.titleAlert)flashTitle(title);
}
function flashTitle(msg){let on=true,n=0;const iv=setInterval(()=>{document.title=on?'❗ '+msg:'FTools';on=!on;n++;if(n>20){clearInterval(iv);document.title='FTools';}},500);}

function checkTrig(){
  const now=Date.now();
  S.rem.forEach(r=>{
    if(r.done&&r.rep==='none')return;
    const at=r.at-(r.adv||0)*60000;
    if(now>=at&&!ntf.has(r.id)){
      ntf.add(r.id);
      const cat=r.cat==='farm'?{e:'🌾'}:(S.cats.find(c=>c.id===r.cat)||{e:'📌'});
      notify(cat.e+' '+r.title,r.note||'时间到了！');
      if(r.rep&&r.rep!=='none')schedNext(r,now);
    }
  });
}
function schedNext(r,now){
  const t=r.at;let nx;
  if(r.rep==='daily')nx=t+86400000;
  else if(r.rep==='weekly')nx=t+604800000;
  else if(r.rep==='hourly')nx=t+3600000;
  else if(r.rep==='30min')nx=t+1800000;
  else if(r.rep==='custom')nx=t+(r.intv||60)*60000;
  else if(r.rep==='weekdays'){let d=new Date(t);do{d=new Date(d.getTime()+86400000)}while(d.getDay()===0||d.getDay()===6);nx=d.getTime();}
  if(nx&&nx>now){r.at=nx;ntf.delete(r.id);}
}

function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
function playSound(){
  const id=S.cfg.snd,cnt=S.cfg.sndCnt||2;
  if(id==='custom'&&S.cfg.sndData){for(let i=0;i<cnt;i++)setTimeout(()=>{try{new Audio(S.cfg.sndData).play().catch(()=>{})}catch(e){}},i*1300);return;}
  for(let i=0;i<cnt;i++)setTimeout(()=>synthSnd(id),i*1100);
}
function synthSnd(id){
  try{const ctx=getCtx();
    if(id==='bell')synth(ctx,[1318,1568,1760],85);
    else if(id==='chime')synth(ctx,[523,659,784,1046],115);
    else if(id==='marimba')synth(ctx,[784,1047,1319,1047,784],95);
    else if(id==='ding')synth(ctx,[1046,1319],160);
    else if(id==='beep')synth(ctx,[880,1100,880],100);
    else if(id==='pop')synthPop(ctx);
    else if(id==='alert')synth(ctx,[440,880,440,880],80,'square');
    else synth(ctx,[1318,1568,1760],85);
  }catch(e){}
}
function synth(ctx,freqs,dur=100,type='sine'){freqs.forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.connect(g);g.connect(ctx.destination);o.frequency.value=f;const t=ctx.currentTime+i*(dur/1000);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur/950);o.start(t);o.stop(t+dur/1000+0.05);});}
function synthPop(ctx){const b=ctx.createBuffer(1,ctx.sampleRate*.1,ctx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.018));const s=ctx.createBufferSource();s.buffer=b;s.connect(ctx.destination);s.start();}
function renderSndList(){const el=document.getElementById('sndlist');if(!el)return;el.innerHTML=SNDS.map(s=>`<div class="si ${S.cfg.snd===s.id?'on':''}" onclick="pickSnd('${s.id}')">${s.l}<span style="font-size:10px;opacity:.55;margin-left:3px" onclick="event.stopPropagation();previewSnd('${s.id}')">▶</span></div>`).join('');}
function pickSnd(id){if(id==='custom'&&!S.cfg.sndData){toast('请先上传铃声');return}S.cfg.snd=id;save();renderSndList();toast('已选：'+SNDS.find(s=>s.id===id)?.l);synthSnd(id);}
function previewSnd(id){if(id==='custom'&&S.cfg.sndData){try{new Audio(S.cfg.sndData).play().catch(()=>{})}catch(e){}return}synthSnd(id);}
function uploadSnd(){const f=document.getElementById('sndfile').files[0];if(!f)return;if(f.size>5*1024*1024){toast('文件不超过5MB');return}const r=new FileReader();r.onload=e=>{S.cfg.sndData=e.target.result;S.cfg.snd='custom';save();renderSndList();toast('✅ 铃声已上传')};r.readAsDataURL(f);}

function allC(){return[...ALLC,...S.ucrop];}
function catC(c){return allC().filter(x=>x.c===c);}
function renderCCTabs(){const el=document.getElementById('cctabs');if(!el)return;const ex=[...new Set(S.ucrop.map(x=>x.c).filter(x=>!CCAT.includes(x)))];el.innerHTML=[...CCAT,...ex].map(c=>`<div class="cctab ${selCC===c?'on':''}" onclick="pickCC('${c}')">${c}</div>`).join('');}
function pickCC(c){selCC=c;selCI=0;renderCCTabs();renderCCRow();}
function renderCCRow(){const el=document.getElementById('ccrow');if(!el)return;const crops=catC(selCC);el.innerHTML=crops.map((c,i)=>`<div class="cc ${selCI===i?'sel':''}" onclick="selCrop(${i})"><button class="ce" onclick="event.stopPropagation();openCE(${i})">✏️</button><span class="ci">${c.e}</span><div class="cn">${c.n}</div><div class="cd">${fmtM(c.m)}</div>${c.p?`<div class="cp">💰${c.p}</div>`:''}</div>`).join('')+`<div class="cc-add" onclick="document.getElementById('ccn').focus()"><span style="font-size:22px">➕</span>自定义</div>`;}
function selCrop(i){selCI=i;renderCCRow();}
function openCE(i){const c=catC(selCC)[i],ai=allC().findIndex(x=>x.n===c.n&&x.c===c.c);document.getElementById('eidx').value=ai;document.getElementById('eico').value=c.e;document.getElementById('enm').value=c.n;document.getElementById('etm').value=fmtM(c.m);document.getElementById('epr').value=c.p||'';document.getElementById('cmodal').classList.add('on');}
function closeCM(){document.getElementById('cmodal').classList.remove('on');}
function saveCE(){const i=+document.getElementById('eidx').value,m=parseT(document.getElementById('etm').value);if(!m){toast('时间格式有误');return}const c=allC()[i];const p={e:document.getElementById('eico').value||c.e,n:document.getElementById('enm').value||c.n,c:c.c,m,p:document.getElementById('epr').value.trim()};if(i<ALLC.length){const ui=S.ucrop.findIndex(x=>x.n===c.n&&x.c===c.c);if(ui>=0)S.ucrop[ui]=p;else S.ucrop.push(p);}else S.ucrop[i-ALLC.length]=p;save();renderCCRow();closeCM();toast('✅ 已保存');}
function setCCT(v){document.getElementById('cct').value=v;}

function addFarm(){
  const owner=selP==='自己'?'自己':selF;
  if(selP==='好友'&&!selF){toast('请选择好友');return}
  const tv=document.getElementById('fpat').value,planted=tv?new Date(tv).getTime():Date.now();
  const cn=document.getElementById('ccn').value.trim(),ct=document.getElementById('cct').value.trim();
  let nm,mn,pr='';
  if(cn&&ct){mn=parseT(ct);if(!mn){toast('时间格式有误');return}nm=cn;pr=document.getElementById('ccp').value.trim();S.ucrop.push({e:'🌿',n:nm,c:'特产',m:mn,p:pr});save();renderCCTabs();renderCCRow();document.getElementById('ccn').value='';document.getElementById('cct').value='';document.getElementById('ccp').value='';}
  else{const crops=catC(selCC),cr=crops[selCI];if(!cr){toast('请选择作物');return}nm=cr.n;mn=cr.m;pr=cr.p||'';}
  const r={id:Date.now()+'_'+rnd(),cat:'farm',title:owner==='自己'?'我的'+nm:owner+'的'+nm,note:(owner==='自己'?'自己的菜熟了！快去收！':'去偷 '+owner+' 的'+nm+'！')+(pr?' 💰'+pr:''),at:planted+mn*60000,pa:planted,rep:'none',adv:0,done:false};
  S.rem.push(r);save();
  toast('🌱 '+r.title+' '+fmtM(mn)+'后成熟');
  document.querySelectorAll('.popt').forEach(e=>e.classList.remove('on'));document.querySelector('.popt[data-v="自己"]').classList.add('on');
  selP='自己';selF='';document.getElementById('farea').style.display='none';document.getElementById('fpat').value='';
  renderFChips();renderFList();
}
function pickP(el){document.querySelectorAll('.popt').forEach(e=>e.classList.remove('on'));el.classList.add('on');selP=el.dataset.v;document.getElementById('farea').style.display=selP==='好友'?'block':'none';}
function renderFChips(){const el=document.getElementById('fchips');if(!el)return;el.innerHTML=S.friends.map(f=>`<div class="fchip ${selF===f?'on':''}" onclick="pickF('${f}')">${f}</div>`).join('');}
function pickF(n){selF=n;renderFChips();}
function addFriend(){const v=document.getElementById('nfriend').value.trim();if(!v)return;if(!S.friends.includes(v))S.friends.push(v);selF=v;document.getElementById('nfriend').value='';save();renderFChips();}

function renderCatChips(){const el=document.getElementById('catchips');if(!el)return;el.innerHTML=S.cats.map(c=>`<div class="cchip ${selCat===c.id?'on':''}" style="color:${c.col}" onclick="pickCat('${c.id}')">${c.e} ${c.l}</div>`).join('')+`<div class="cchip" onclick="goTab('s')" style="color:var(--tx2);border-style:dashed">＋</div>`;}
function pickCat(id){selCat=id;renderCatChips();}
function renderCatMng(){const el=document.getElementById('catmng');if(!el)return;el.innerHTML=S.cats.map((c,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)"><span>${c.e}</span><span style="flex:1;font-size:13px">${c.l}</span><button class="btn btnd btns" onclick="rmCat(${i})" ${i<DCAT.length?'disabled style="opacity:.3"':''}>删除</button></div>`).join('');}
function addCat(){const e=document.getElementById('nico').value.trim()||'📌',l=document.getElementById('nlbl').value.trim();if(!l){toast('请填写分类名称');return}const cols=['#ff5a5a','#4cc9f0','#ff9f4a','#c084fc','#3dba6f','#ffd460','#fb923c'];S.cats.push({id:'c'+Date.now(),l,e,col:cols[S.cats.length%cols.length]});document.getElementById('nico').value='';document.getElementById('nlbl').value='';save();renderCatChips();renderCatMng();toast('✅ 分类已添加');}
function rmCat(i){if(i<DCAT.length){toast('默认分类不可删除');return}S.cats.splice(i,1);save();renderCatChips();renderCatMng();}

document.getElementById('rrep').addEventListener('change',function(){document.getElementById('rintrow').style.display=this.value==='custom'?'flex':'none';});
function addReminder(){
  const title=document.getElementById('rt').value.trim(),tv=document.getElementById('rtime').value;
  if(!title){toast('请填写标题');return}if(!tv){toast('请选择时间');return}
  const r={id:Date.now()+'_'+rnd(),cat:selCat,title,note:document.getElementById('rn').value.trim(),at:new Date(tv).getTime(),pa:Date.now(),rep:document.getElementById('rrep').value,intv:+document.getElementById('rint').value||60,adv:+document.getElementById('radv').value||0,done:false};
  S.rem.push(r);save();toast('✅ 已保存'+(S.cfg.workerUrl&&S.cfg.barkKey?' · Bark将自动推送':''));
  document.getElementById('rt').value='';document.getElementById('rn').value='';document.getElementById('rtime').value='';goTab('r');
}

function renderRList(){
  const now=Date.now(),el=document.getElementById('rlist');if(!el)return;
  const items=S.rem.filter(r=>r.cat!=='farm').sort((a,b)=>a.at-b.at);
  if(!items.length){el.innerHTML='<div class="empty"><div class="eico">⏰</div>还没有提醒，去"添加"创建吧</div>';return}
  const act=items.filter(r=>r.at>=now||r.rep!=='none'),dn=items.filter(r=>r.at<now&&r.rep==='none');
  let h='';
  if(act.length)h+='<div class="sl">进行中</div>'+act.map(r=>itemH(r,now)).join('');
  if(dn.length)h+='<div class="sl">已到期</div>'+dn.map(r=>itemH(r,now)).join('');
  el.innerHTML=h;
}
function renderFList(){
  const now=Date.now(),el=document.getElementById('flist');if(!el)return;
  const items=S.rem.filter(r=>r.cat==='farm').sort((a,b)=>a.at-b.at);
  if(!items.length){el.innerHTML='<div class="empty"><div class="eico">🌾</div>还没有农场提醒</div>';return}
  el.innerHTML='<div class="sl">我的农场</div>'+items.map(r=>itemH(r,now)).join('');
}
function itemH(r,now){
  const cat=r.cat==='farm'?{e:'🌾',col:'var(--g)'}:(S.cats.find(c=>c.id===r.cat)||{e:'📌',col:'#6a9a6a'});
  const rem=r.at-now,mat=rem<=0,soon=rem>0&&rem<600000;
  const pct=r.pa?Math.min(100,Math.max(0,(now-r.pa)/(r.at-r.pa)*100)):mat?100:0;
  const badge=S.cfg.workerUrl&&S.cfg.barkKey?'<span style="font-size:10px;opacity:.5;margin-left:3px">🔔</span>':'';
  return `<div class="item ${mat?'mat':soon?'soon':''}"><div class="irow"><div class="ibody">
    <div class="itr"><span class="iemj">${cat.e}</span><span class="itit">${r.title}</span>${badge}</div>
    ${r.note?`<div class="imeta">${r.note}</div>`:''}
    <div class="imeta">🕐 ${new Date(r.at).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    ${r.rep&&r.rep!=='none'?`<div class="imeta">🔄 ${RLBL[r.rep]||''}</div>`:''}
    <div class="icd ${mat?'done':''}">${mat?'⚡ 立刻行动！':fmtCD(rem)}</div>
    <div class="prog"><div class="progb" style="width:${pct}%;background:${mat?'var(--yel)':cat.col}"></div></div>
  </div><button class="delbtn" onclick="delR('${r.id}')">🗑</button></div></div>`;
}
function delR(id){S.rem=S.rem.filter(r=>r.id!==id);ntf.delete(id);save();}

function togSet(key){S.cfg[key]=!S.cfg[key];save();const m={sound:'tog-sound',titleAlert:'tog-title'};document.getElementById(m[key]).className='tog'+(S.cfg[key]?' on':'');}
function clearDone(){if(!confirm('清除已到期提醒？'))return;const now=Date.now();S.rem=S.rem.filter(r=>r.at>=now||r.rep!=='none');save();toast('✅ 已清除');}
function clearAll(){if(!confirm('确定清除全部数据？'))return;S.rem=[];save();toast('✅ 已清除');}

function exportD(){
  const d=JSON.stringify({rem:S.rem,friends:S.friends,cats:S.cats.slice(DCAT.length),ucrop:S.ucrop,cfg:{...S.cfg,sndData:null}},null,2);
  const blob=new Blob([d],{type:'application/json'}),url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='ftools_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
  const ev=document.getElementById('expview');ev.style.display='block';ev.textContent=d.slice(0,300)+'...';toast('📤 已导出！');
}
function importD(){
  const f=document.getElementById('impfile').files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.rem)S.rem=[...S.rem,...d.rem.filter(x=>!S.rem.find(y=>y.id===x.id))];
      if(d.friends)S.friends=[...new Set([...S.friends,...d.friends])];
      if(d.cats)S.cats=[...JSON.parse(JSON.stringify(DCAT)),...d.cats];
      if(d.ucrop)S.ucrop=[...S.ucrop,...d.ucrop];
      if(d.cfg)S.cfg={...S.cfg,...d.cfg};
      save();renderAll();renderSndList();
      document.getElementById('workerUrl').value=S.cfg.workerUrl||'';
      document.getElementById('barkKey').value=S.cfg.barkKey||'';
      renderWorkerBar();toast('✅ 导入成功！共'+S.rem.length+'条提醒');
    }catch(x){toast('导入失败')}
  };r.readAsText(f);
}

function parseT(s){if(!s)return 0;s=s.trim().toLowerCase().replace('小时','h').replace('分钟','m').replace('分','m').replace('时','h').replace('天','d');const dm=s.match(/^(\d+\.?\d*)d$/i);if(dm)return Math.round(+dm[1]*1440);const hm=s.match(/^(\d+\.?\d*)h(\d+\.?\d*)?m?$/i);if(hm)return Math.round(+hm[1]*60+(+hm[2]||0));const mm=s.match(/^(\d+\.?\d*)m?$/i);if(mm)return Math.round(+mm[1]);return 0;}
function fmtM(m){return m<60?m+'分钟':m%60===0?m/60+'小时':Math.floor(m/60)+'小时'+m%60+'分';}
function fmtCD(ms){if(ms<=0)return '已到期';const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;if(h>0)return h+'小时'+m+'分'+sc+'秒';if(m>0)return m+'分'+sc+'秒';return sc+'秒';}
function rnd(){return Math.random().toString(36).slice(2,6);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2600);}
function goTab(k){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.getElementById('tab-'+k).classList.add('on');document.getElementById('pg-'+k).classList.add('on');}
</script>
